{% extends 'hospital/base.html' %}
{% load static %}

{% block content %}

<!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* Full-screen background */
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
    background: url("{% static 'css/images/hp2.jpg' %}") no-repeat center center fixed;
    background-size: cover;
    position: relative;
}

/* Dark overlay */
body::before {
    content: "";
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.35);
    z-index: 0;
}

/* Glassmorphic login card */
.login-card {
    position: relative;
    z-index: 1;
    max-width: 400px;
    margin: 8% auto;
    padding: 40px 30px;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.3);
    animation: fadeInUp 0.8s forwards;
}

/* Heading */
.login-card h2 {
    text-align: center;
    color: #fff;
    margin-bottom: 30px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
}

/* Floating labels with icons */
.input-group {
    position: relative;
    margin-bottom: 25px;
}

.input-group i {
    position: absolute;
    top: 50%;
    left: 12px;
    transform: translateY(-50%);
    color: #3498db;
    font-size: 18px;
}

.input-group input {
    width: 100%;
    padding: 12px 12px 12px 40px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.5);
    outline: none;
    background: rgba(255,255,255,0.6);
    color: #2c3e50;
    box-sizing: border-box;
}

.input-group label {
    position: absolute;
    top: 50%;
    left: 40px;
    transform: translateY(-50%);
    pointer-events: none;
    color: #555;
    transition: 0.3s ease all;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label {
    top: -8px;
    left: 12px;
    font-size: 12px;
    color: #3498db;
    background: rgba(255,255,255,0.25);
    padding: 0 5px;
    border-radius: 4px;
}

.input-group input:focus {
    border-color: #3498db;
    box-shadow: 0 0 12px rgba(52,152,219,0.5);
    background: rgba(255,255,255,0.85);
}

/* Button */
.login-card button {
    width: 100%;
    padding: 12px;
    background-color: rgba(52,152,219,0.85);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: 0.3s;
}

.login-card button:hover {
    background-color: rgba(41,128,185,0.9);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}

.login-card button i {
    transition: transform 0.3s;
}

.login-card button:hover i {
    transform: translateX(4px);
}

/* Error message */
.error-msg {
    color: #ff5555;
    text-align: center;
    margin-top: 10px;
}

/* Animations */
@keyframes fadeInUp {
    to { transform: translateY(0); opacity: 1; }
}

/* Responsive */
@media (max-width:480px){
    .login-card {
        margin: 15% 15px;
        padding: 30px 20px;
    }
    .input-group i {
        left: 10px;
    }
}
</style>

<div class="login-card">
    <h2><i class="fa-solid fa-right-to-bracket"></i> Login</h2>
    <form method="post">
        {% csrf_token %}
        <div class="input-group">
            <i class="fa-solid fa-user"></i>
            <input type="text" name="username" placeholder=" " required>
            <label>Username</label>
        </div>
        <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" name="password" placeholder=" " required>
            <label>Password</label>
        </div>
        <button type="submit"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
        {% if error %}
            <p class="error-msg">{{ error }}</p>
        {% endif %}
    </form>
</div>

{% endblock %}
